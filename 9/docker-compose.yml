version: "3.9"

services:
  node1:
    image: nicolaka/netshoot:latest
    container_name: node1
    command: sleep infinity
    networks:
      dualstack_net:
        ipv4_address: 172.28.0.11
        ipv6_address: fd00:1234:5678:1::11

  node2:
    image: nicolaka/netshoot:latest
    container_name: node2
    command: sleep infinity
    networks:
      dualstack_net:
        ipv4_address: 172.28.0.12
        ipv6_address: fd00:1234:5678:1::12

networks:
  dualstack_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd00:1234:5678:1::/64
